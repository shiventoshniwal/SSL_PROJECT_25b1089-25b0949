<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Snake Stack</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/static/styles.css">
</head>
<body>

    <div class="game-wrapper">
        <h1>Snake Stack</h1>
        <canvas id="gameCanvas" width="900" height="900"></canvas>
    </div>

    <div class="modal fade" id="startModal" data-bs-backdrop="static">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="welcome">Welcome to Snake Stack</h5>
                </div>
                <div class="modal-body">
                    <p><strong>Rules:</strong> Use Arrow keys or WASD to move.</p>
                    <ul>
                        <li><div class="carrot">Carrot: +1 Score</div></li>
                        <li><div class="pie">Pumpkin Pie: +3 Score</div></li>
                        <li><div class="apple">Golden Apple: 10s Immunity (No growth)</div></li>
                    </ul>
                    <input type="text" id="usernameInput" class="form-control" placeholder="Enter Username">
                </div>
                <div class="modal-footer">
                    <button class="btn btn-primary" id="startBtn">Start Game</button>
                </div>
            </div>
        </div>
    </div>

    <div class="modal fade" id="gameOverModal" data-bs-backdrop="static">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="text-danger">Game Over</h5>
                </div>
                <div id="gameOverBody" class="modal-body"></div>
                <div class="modal-footer">
                    <button class="btn btn-primary" onclick="UI.gameOverModal.hide(); Game.init();">
                        Play Again
                    </button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="/static/api.js"></script>
    <script src="/static/ui.js"></script>
    <script src="/static/game.js"></script>

</body>
</html>
